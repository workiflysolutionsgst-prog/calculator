<!DOCTYPE html>
<html>
<head>
  <title>Pro Calculator</title>
  <link rel="manifest" href="manifest.json">
  </head>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
      font-family: Arial;
    }

    .calculator {
      background: #222;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    #result {
      width: 100%;
      height: 60px;
      font-size: 28px;
      margin-bottom: 15px;
      text-align: right;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #000;
      color: #0f0;
    }

    .btn {
      width: 70px;
      height: 70px;
      margin: 5px;
      font-size: 20px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.1);
    }

    .number {
      background: #333;
      color: white;
    }

    .operator {
      background: orange;
      color: white;
    }

    .equal {
      background: green;
      color: white;
      width: 150px;
    }

    .clear {
      background: red;
      color: white;
    }
  </style>
</head>
<body>

<div class="calculator">
  <input type="text" id="result" disabled>

  <div>
    <button class="btn clear" onclick="clearScreen()">C</button>
    <button class="btn operator" onclick="press('/')">/</button>
    <button class="btn operator" onclick="press('*')">*</button>
    <button class="btn operator" onclick="press('-')">-</button>
  </div>

  <div>
    <button class="btn number" onclick="press(7)">7</button>
    <button class="btn number" onclick="press(8)">8</button>
    <button class="btn number" onclick="press(9)">9</button>
    <button class="btn operator" onclick="press('+')">+</button>
  </div>

  <div>
    <button class="btn number" onclick="press(4)">4</button>
    <button class="btn number" onclick="press(5)">5</button>
    <button class="btn number" onclick="press(6)">6</button>
  </div>

  <div>
    <button class="btn number" onclick="press(1)">1</button>
    <button class="btn number" onclick="press(2)">2</button>
    <button class="btn number" onclick="press(3)">3</button>
  </div>

  <div>
    <button class="btn number" onclick="press(0)">0</button>
    <button class="btn equal" onclick="calculate()">=</button>
  </div>
</div>

<script>
function press(val) {
  document.getElementById("result").value += val;
}

function calculate() {
  let res = document.getElementById("result").value;
  try {
    document.getElementById("result").value = eval(res);
  } catch {
    alert("Invalid Input");
  }
}

function clearScreen() {
  document.getElementById("result").value = "";
}
</script>
  <script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("Service Worker Registered"));
}
</script>

</body>
</html>
